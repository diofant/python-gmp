version: 2
formats:
    - htmlzip
    - pdf
build:
    os: ubuntu-24.04
    apt_packages:
        - libgmp-dev
        - build-essential
        - pkg-config
        - curl
    jobs:
      pre_create_environment:
        - sh scripts/cibw_before_all.sh --skip-gmp
    tools:
        python: "3"
python:
    install:
        - path: .
          extra_requirements:
              - docs
sphinx:
    fail_on_warning: true
    configuration: docs/conf.py
